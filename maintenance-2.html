    -webkit-text-fill-color:transparent;
    background-clip:text;
  }
  p{
    font-size:15px;
    line-height:1.8;
    color:#5a5a7a;
    margin:0 0 6px;
  }
  .sub{font-size:13px;color:#9a8ac0;margin-top:16px;}
