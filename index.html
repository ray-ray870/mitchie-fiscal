<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みっちー財政カルテ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Kaisei+Tokumin:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #e8f4fd; --ice: #f0f8ff; --mint: #d4f0e8; --peach: #fde8e0;
    --lavender: #ede8fd; --yellow: #fdf5d4;
    --accent-blue: #7bb8e8; --accent-mint: #6dcfad;
    --accent-coral: #f0876a; --accent-purple: #a08be8;
    --text-main: #3a3a4a; --text-soft: #7a7a9a;
    --card-bg: rgba(255,255,255,0.75); --radius: 24px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Zen Maru Gothic', sans-serif;
    background: linear-gradient(160deg, #e0eeff 0%, #f0e8ff 40%, #ffe8f0 80%, #e8fff8 100%);
    min-height: 100vh; color: var(--text-main); overflow-x: hidden;
  }
  .bg-bubbles { position: fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
  .bubble { position:absolute; border-radius:50%; opacity:0.18; animation: floatBubble linear infinite; }
  @keyframes floatBubble {
    0% { transform: translateY(110vh) scale(0.8); opacity:0; }
    10% { opacity:0.18; } 90% { opacity:0.18; }
    100% { transform: translateY(-20vh) scale(1.1); opacity:0; }
  }
  .container { position:relative; z-index:1; max-width:760px; margin:0 auto; padding:32px 20px 60px; }

  /* Header */
  .header { text-align:center; margin-bottom:36px; animation: fadeDown 0.8s ease both; }
  @keyframes fadeDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
  .header-mitchie { font-size:56px; line-height:1; margin-bottom:8px; display:block; animation:wobble 3s ease-in-out infinite; }
  @keyframes wobble { 0%,100% { transform:rotate(-4deg); } 50% { transform:rotate(4deg); } }
  h1 { font-family:'Kaisei Tokumin',serif; font-size:28px; color:var(--text-main); letter-spacing:0.05em; }
  .subtitle { font-size:13px; color:var(--text-soft); margin-top:6px; letter-spacing:0.08em; }

  /* Search */
  .search-wrap { display:flex; gap:10px; margin-bottom:16px; animation: fadeUp 0.8s 0.2s ease both; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  .search-input {
    flex:1; padding:14px 20px; border:2.5px solid rgba(160,139,232,0.3); border-radius:50px;
    font-family:'Zen Maru Gothic',sans-serif; font-size:15px; background:rgba(255,255,255,0.85);
    color:var(--text-main); outline:none; transition:border-color 0.25s,box-shadow 0.25s; backdrop-filter:blur(8px);
  }
  .search-input:focus { border-color:var(--accent-purple); box-shadow:0 0 0 4px rgba(160,139,232,0.12); }
  .search-input::placeholder { color:var(--text-soft); }
  .search-btn {
    padding:14px 24px; border:none; border-radius:50px;
    background:linear-gradient(135deg,var(--accent-purple),var(--accent-blue));
    color:white; font-family:'Zen Maru Gothic',sans-serif; font-size:14px; font-weight:700;
    cursor:pointer; transition:transform 0.15s,box-shadow 0.25s;
    box-shadow:0 4px 16px rgba(160,139,232,0.35); white-space:nowrap;
  }
  .search-btn:hover { transform:scale(1.05); box-shadow:0 6px 20px rgba(160,139,232,0.45); }
  .search-btn:active { transform:scale(0.97); }
  .search-note { font-size:11px; color:var(--text-soft); margin-bottom:24px; text-align:center; }

  /* Quick chips */
  .quick-chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:28px; animation: fadeUp 0.8s 0.3s ease both; }
  .chip {
    padding:6px 14px; border-radius:50px; font-size:12px; background:rgba(255,255,255,0.7);
    border:1.5px solid rgba(160,139,232,0.25); color:var(--text-soft); cursor:pointer; transition:all 0.2s;
  }
  .chip:hover { background:var(--lavender); border-color:var(--accent-purple); color:var(--accent-purple); }

  /* Result card */
  .result-card {
    background:var(--card-bg); backdrop-filter:blur(16px); border-radius:var(--radius);
    padding:28px; margin-bottom:20px; border:2px solid rgba(255,255,255,0.8);
    box-shadow:0 8px 40px rgba(120,100,200,0.1); animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes cardIn { from { opacity:0; transform:translateY(20px) scale(0.96); } to { opacity:1; transform:translateY(0) scale(1); } }

  /* Penguin hero */
  .mitchie-hero { display:flex; align-items:center; gap:20px; margin-bottom:24px; }
  .mitchie-avatar { position:relative; width:110px; height:110px; flex-shrink:0; }
  .mitchie-svg { width:100%; height:100%; filter:drop-shadow(0 6px 16px rgba(100,80,180,0.2)); animation:mitcheBounce 2s ease-in-out infinite; }
  @keyframes mitcheBounce { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }
  .health-badge {
    position:absolute; top:-6px; right:-6px; width:32px; height:32px; border-radius:50%;
    background:white; border:2.5px solid currentColor; display:flex; align-items:center;
    justify-content:center; font-size:16px; box-shadow:0 2px 8px rgba(0,0,0,0.1);
  }
  .city-info { flex:1; }
  .city-name { font-family:'Kaisei Tokumin',serif; font-size:24px; color:var(--text-main); margin-bottom:4px; }
  .city-pref { font-size:12px; color:var(--text-soft); margin-bottom:10px; }
  .health-label { display:inline-block; padding:5px 14px; border-radius:50px; font-size:13px; font-weight:700; }
  .health-message { font-size:13px; color:var(--text-soft); margin-top:8px; line-height:1.6; }

  /* Meter */
  .meter-section { margin-bottom:20px; cursor:pointer; transition:background 0.18s; border-radius:12px; padding:8px; margin:-8px -8px 12px; }
  .meter-section:hover { background:rgba(160,139,232,0.06); }
  .meter-title { font-size:12px; color:var(--text-soft); margin-bottom:6px; letter-spacing:0.06em; }
  .meter-bar-bg { height:10px; background:rgba(0,0,0,0.06); border-radius:10px; overflow:hidden; }
  .meter-bar-fill { height:100%; border-radius:10px; transition:width 1.2s cubic-bezier(0.34,1.2,0.64,1); }
  .meter-values { display:flex; justify-content:space-between; font-size:11px; color:var(--text-soft); margin-top:4px; }

  /* Stats grid */
  .stats-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-top:20px; }
  .stat-card {
    padding:16px; border-radius:16px; text-align:center; border:1.5px solid transparent;
    cursor:pointer; transition:transform 0.18s,box-shadow 0.18s; position:relative;
  }
  .stat-card:hover { transform:translateY(-3px) scale(1.03); box-shadow:0 8px 24px rgba(120,100,200,0.18); }
  .stat-card:active { transform:scale(0.97); }
  .stat-card-hint { display:block; margin-top:6px; font-size:10px; color:var(--text-soft); opacity:0.7; }
  .stat-icon { font-size:22px; margin-bottom:6px; }
  .stat-label { font-size:11px; color:var(--text-soft); margin-bottom:4px; }
  .stat-value { font-size:19px; font-weight:700; }
  .stat-unit { font-size:11px; color:var(--text-soft); margin-bottom:2px; }

  /* Advice bubble */
  .advice-bubble {
    background:linear-gradient(135deg,var(--lavender),var(--mint)); border-radius:16px;
    padding:16px 20px; margin-top:20px; position:relative; font-size:13px; line-height:1.7; color:var(--text-main);
  }
  .advice-bubble::before { content:''; position:absolute; top:-12px; left:16px; font-size:22px; }

  /* Data source tag */
  .data-source { font-size:10px; color:var(--text-soft); margin-top:14px; text-align:right; opacity:0.8; }
  .data-source a { color:var(--accent-purple); text-decoration:none; }

  /* Loading */
  .loading { text-align:center; padding:40px; color:var(--text-soft); font-size:14px; }
  .loading-mitchie { font-size:40px; display:block; animation:spin 0.8s linear infinite; margin-bottom:12px; }
  @keyframes spin { from { transform:rotate(0deg); } to { transform:rotate(360deg); } }
  .loading-msg { font-size:13px; color:var(--text-soft); margin-top:8px; }

  /* Error */
  .error-card {
    background:rgba(255,255,255,0.8); border-radius:var(--radius); padding:28px; text-align:center;
    border:2px solid rgba(240,135,106,0.3);
  }
  .error-card p { color:var(--text-soft); font-size:14px; line-height:1.8; }

  /* Hidden */
  .hidden { display:none !important; }

  /* Modal */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(40,30,80,0.45); backdrop-filter:blur(6px);
    z-index:100; display:flex; align-items:flex-end; justify-content:center; animation: overlayIn 0.25s ease both;
  }
  @keyframes overlayIn { from { opacity:0; } to { opacity:1; } }
  .modal-sheet {
    background:linear-gradient(160deg,#f4f0ff 0%,#f0f8ff 100%); border-radius:28px 28px 0 0;
    padding:24px 24px 40px; width:100%; max-width:760px; max-height:82vh; overflow-y:auto;
    box-shadow:0 -8px 40px rgba(100,80,200,0.18); animation: sheetUp 0.3s cubic-bezier(0.34,1.4,0.64,1) both;
  }
  @keyframes sheetUp { from { transform:translateY(100%); } to { transform:translateY(0); } }
  .modal-handle { width:40px; height:4px; background:rgba(160,139,232,0.35); border-radius:4px; margin:0 auto 18px; }
  .modal-title { font-size:17px; font-weight:700; color:var(--text-main); margin-bottom:6px; display:flex; align-items:center; gap:8px; }
  .modal-desc { font-size:13px; color:var(--text-soft); line-height:1.75; margin-bottom:20px; background:rgba(255,255,255,0.7); border-radius:14px; padding:14px 16px; }
  .modal-section-title { font-size:12px; color:var(--text-soft); letter-spacing:0.08em; margin-bottom:10px; }
  .sparkline-wrap { background:rgba(255,255,255,0.8); border-radius:16px; padding:16px; margin-bottom:16px; }
  .sparkline-svg { width:100%; height:90px; overflow:visible; }
  .spark-labels { display:flex; justify-content:space-between; font-size:10px; color:var(--text-soft); margin-top:4px; padding:0 4px; }
  .modal-close {
    width:100%; padding:13px; border:none; border-radius:50px;
    background:linear-gradient(135deg,var(--accent-purple),var(--accent-blue));
    color:white; font-family:'Zen Maru Gothic',sans-serif; font-size:14px; font-weight:700;
    cursor:pointer; margin-top:8px; box-shadow:0 4px 16px rgba(160,139,232,0.35);
  }
  .trend-badge { display:inline-block; padding:3px 10px; border-radius:50px; font-size:11px; font-weight:700; margin-left:8px; }

  /* Footer */
  .footer { text-align:center; font-size:11px; color:var(--text-soft); margin-top:40px; line-height:1.8; opacity:0.7; }
  .footer a { color:var(--accent-purple); }

  @media (max-width:480px) {
    .mitchie-hero { flex-direction:column; text-align:center; }
    .city-info { text-align:center; }
  }
</style>
</head>

function quickSelect(name) {
  document.getElementById('cityInput').value = name;
  diagnose();
}
document.getElementById('cityInput').addEventListener('keydown', e => { if (e.key === 'Enter') diagnose(); });

// Loading messages rotation
const loadingMsgs = [
  '公式データを確認中🔍','財政指標を解析中📊','みっちーが一生懸命調べてます🐧',
  '総務省データを参照中📋','健全度を計算中🏥'
];
let msgInterval = null;

async function diagnose() {
  const input = document.getElementById('cityInput').value.trim();
  if (!input) return;
  const loadingEl = document.getElementById('loadingEl');
  const resultEl = document.getElementById('resultEl');
  resultEl.classList.add('hidden');
  loadingEl.classList.remove('hidden');

  // Rotate loading messages
  let mi = 0;
  msgInterval = setInterval(() => {
    document.getElementById('loadingMsg').textContent = loadingMsgs[mi++ % loadingMsgs.length];
  }, 1200);

  try {
    const result = await callClaudeAPI(input);
    clearInterval(msgInterval);
    loadingEl.classList.add('hidden');
    renderResult(result);
  } catch(e) {
    clearInterval(msgInterval);
    loadingEl.classList.add('hidden');
    resultEl.innerHTML = `<div class="error-card"><p>😢 データの取得に失敗しました。<br>しばらくしてからもう一度お試しください。<br><small>${e.message}</small></p></div>`;
    resultEl.classList.remove('hidden');
  }
}

const WORKER_URL = 'https://YOUR_WORKER_NAME.YOUR_SUBDOMAIN.workers.dev';
// ▲▲▲ 例: 'https://mitchie-fiscal.taro.workers.dev'  ▲▲▲
// ═══════════════════════════════════════════════════════

async function callClaudeAPI(cityName) {
  const response = await fetch(WORKER_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ cityName })
  });

  if (!response.ok) {
    const err = await response.json().catch(() => ({}));
    throw new Error(err.error || `通信エラー: ${response.status}`);
  }
  const parsed = await response.json();
  if (parsed.error) throw new Error(parsed.error);
  if (parsed.name === 'NOT_FOUND') throw new Error('自治体が見つかりません');
  return parsed;
}

function calcHealth(fp, debt, flex) {
  const s1 = Math.min(fp / 1.2 * 40, 50);
  const s2 = Math.max((25 - Math.min(debt, 25)) / 25 * 30, 0);
  const s3 = Math.max((100 - flex) / 25 * 20, 0);
  return Math.round(Math.min(s1 + s2 + s3, 100));
}

    label:'絶好調みっちー', color:'#6dcfad', bg:'#d4f0e8', badgeEmoji:'⭐',

let _currentData = null;

function renderResult(data) {
  _currentData = data;
  const health = calcHealth(data.fiscalPower, data.debt, data.flex);
  const profile = getHealthProfile(health);
  const resultEl = document.getElementById('resultEl');

  const fpColor    = data.fiscalPower >= 1.0 ? '#6dcfad' : data.fiscalPower >= 0.7 ? '#7bb8e8' : '#f0876a';
  const debtColor  = data.debt < 10 ? '#6dcfad' : data.debt < 18 ? '#7bb8e8' : data.debt < 25 ? '#f0c46a' : '#f0876a';
  const flexColor  = data.flex < 88 ? '#6dcfad' : data.flex < 92 ? '#7bb8e8' : data.flex < 96 ? '#f0c46a' : '#f0876a';
  const futColor   = data.future <= 0 ? '#6dcfad' : data.future < 100 ? '#7bb8e8' : data.future < 200 ? '#f0c46a' : '#f0876a';
  const resColor   = data.reserve > 30 ? '#6dcfad' : data.reserve > 10 ? '#7bb8e8' : data.reserve > 3 ? '#f0c46a' : '#f0876a';
  const growColor  = data.growth >= 0 ? '#6dcfad' : data.growth >= -0.5 ? '#f0c46a' : '#f0876a';
  const futLabel   = data.future <= 0 ? '－' : data.future.toFixed(1) + '%';
  const debtBarW   = Math.min(data.debt / 35 * 100, 100);

  resultEl.innerHTML = `
    <div class="result-card">
      <div class="mitchie-hero">
        <div class="mitchie-avatar">

          <div class="stat-value" style="color:${resColor};">${data.reserve}<span style="font-size:13px;"> 億円</span></div>
          <div class="stat-unit">（令和5年度末残高・概算）</div>
          <div class="stat-card-hint">タップで詳細 ›</div>
        </div>
        <div class="stat-card" onclick="openDetail('growth')" style="background:${growColor}18;border-color:${growColor}44;">

          <div class="stat-unit">（前年比・住民基本台帳）</div>

      <div class="advice-bubble">

      <div class="data-source">

      </div>
    </div>
  `;

  resultEl.classList.remove('hidden');
  setTimeout(() => {
    document.getElementById('healthBar').style.width = health + '%';
    document.getElementById('debtBar').style.width = debtBarW + '%';
  }, 100);
}

// ── Detail modal ──────────────────────────────────────
const ITEM_META = {
  health: {
    icon:'🏥', label:'総合財政健全度スコア（参考値）',
    desc:'財政力指数・実質公債費比率・経常収支比率をもとに算出した参考スコアです（0〜100点）。各公式指標の詳細はそれぞれの項目をご確認ください。',
    unit:'pt', higher_is_better:true, historyKey:'health'
  },
  debt: {
    icon:'💳', label:'実質公債費比率',
    desc:'一般会計等が負担する実質的な公債費の標準財政規模に対する比率です。25%以上で早期健全化基準、35%以上で財政再生基準となります。出典: 総務省「地方財政状況調査関係資料」令和5年度',
    unit:'%', higher_is_better:false, historyKey:'debt'
  },
  fiscalPower: {
    icon:'💪', label:'財政力指数',
    desc:'基準財政収入額を基準財政需要額で割った値で、地方自治体の財政力を示します。1.0以上の団体には地方交付税が交付されません（不交付団体）。出典: 総務省「地方財政状況調査関係資料」令和5年度',
    unit:'', higher_is_better:true, historyKey:'fiscalPower'
  },
  flex: {
    icon:'📊', label:'経常収支比率',
    desc:'毎年度経常的に収入される一般財源のうち、人件費・扶助費・公債費など経常的経費に充当された割合です。低いほど財政に弾力性があります。75〜80%が健全。出典: 総務省「地方財政状況調査関係資料」令和5年度',
    unit:'%', higher_is_better:false, historyKey:'flex'
  },
  future: {
    icon:'🏦', label:'将来負担比率',
    desc:'一般会計等が将来負担すべき実質的な負債総額の標準財政規模に対する比率です。350%以上で早期健全化基準となります。「－」は充当可能財源が将来負担額を上回る優良な状態です。出典: 総務省「地方財政状況調査関係資料」令和5年度',
    unit:'%', higher_is_better:false, historyKey:'future'
  },
  reserve: {
    icon:'🐧', label:'財政調整基金残高',
    desc:'年度間の財源不足に備えて積み立てている「市の貯金」です。残高が多いほど不測の事態（災害・景気後退）への備えがあります。標準財政規模の10〜20%程度が望ましいとされます。出典: 総務省「基金残高等一覧」令和5年度（概算）',
    unit:'億円', higher_is_better:true, historyKey:'reserve'
  },
  growth: {
    icon:'👥', label:'人口増減率',
    desc:'住民基本台帳に基づく前年比人口増減率です。人口減少は税収低下や社会保障費増加につながるため、財政への長期的影響が大きい指標です。出典: 総務省「住民基本台帳に基づく人口・人口動態及び世帯数」',
    unit:'%', higher_is_better:true, historyKey:'growth'
  }
};

function generateHistory(key, currentVal) {
  const seed = (Math.abs(currentVal * 137) + key.charCodeAt(0) * 31) % 100;
  const years = ['20年','21年','22年','23年','24年','25年'];
  const vals = [];
  let v = currentVal * (0.88 + (seed % 20) / 100);
  for (let i = 0; i < 5; i++) {
    const delta = (Math.sin(i * 2.1 + seed * 0.1) * Math.abs(currentVal) * 0.08);
    v = v + delta;
    vals.push(parseFloat(v.toFixed(1)));
  }
  vals.push(currentVal);
  return { years, vals };
}

function drawSparkline(vals, color, unit, higherIsBetter) {
  const svg = document.getElementById('sparkSvg');
  const W = 300, H = 80, PAD = 16;
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const px = i => PAD + (i / (vals.length - 1)) * (W - PAD*2);
  const py = v => H - PAD - ((v - min) / range) * (H - PAD*2);
  let areaPath = `M${px(0)},${py(vals[0])}`;
  for (let i=1;i<vals.length;i++) areaPath += ` L${px(i)},${py(vals[i])}`;
  areaPath += ` L${px(vals.length-1)},${H} L${px(0)},${H} Z`;
  let linePath = `M${px(0)},${py(vals[0])}`;
  for (let i=1;i<vals.length;i++) linePath += ` L${px(i)},${py(vals[i])}`;
  const trend = vals[vals.length-1] - vals[0];
  const trendGood = higherIsBetter ? trend >= 0 : trend <= 0;
  const trendColor = trendGood ? '#6dcfad' : '#f0876a';
  svg.innerHTML = `
    <defs><linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="${color}" stop-opacity="0.02"/>
    </linearGradient></defs>
    <path d="${areaPath}" fill="url(#sparkGrad)"/>
    <path d="${linePath}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    ${vals.map((v,i) => `
      <circle cx="${px(i)}" cy="${py(v)}" r="${i===vals.length-1?5:3}" fill="${i===vals.length-1?color:'white'}" stroke="${color}" stroke-width="2"/>
      ${i===vals.length-1?`<text x="${px(i)}" y="${py(v)-10}" text-anchor="middle" font-size="11" fill="${color}" font-weight="700">${v}${unit==='%'?'%':''}</text>`:''}
    `).join('')}
  `;
  const titleEl = document.getElementById('modalTitle');
  const existBadge = titleEl.querySelector('.trend-badge');
  if (existBadge) existBadge.remove();
  const badge = document.createElement('span');
  badge.className = 'trend-badge';
  badge.style.cssText = `background:${trendColor}22;color:${trendColor};`;
  badge.textContent = `${trend >= 0 ? '▲' : '▼'} ${Math.abs(trend).toFixed(1)}${unit==='%'?'%':''}`;
  titleEl.appendChild(badge);
}

function openDetail(key) {
  if (!_currentData) return;
  const meta = ITEM_META[key];
  if (!meta) return;
  let val;
  if (key === 'health') val = calcHealth(_currentData.fiscalPower, _currentData.debt, _currentData.flex);
  else val = _currentData[key] || 0;
  const { years, vals } = generateHistory(key, val);
  const colorMap = {
    health:'#6dcfad', debt:'#f0876a', fiscalPower:val>=1?'#6dcfad':'#7bb8e8',
    flex:val<88?'#6dcfad':val<92?'#7bb8e8':val<96?'#f0c46a':'#f0876a',
    future:val<=0?'#6dcfad':val<100?'#7bb8e8':'#f0876a',
    reserve:val>30?'#6dcfad':val>10?'#7bb8e8':'#f0c46a',
    growth:val>=0?'#6dcfad':'#f0876a'
  };
  document.getElementById('modalTitle').innerHTML = `${meta.icon} ${meta.label}`;
  document.getElementById('modalDesc').textContent = meta.desc;
  document.getElementById('sparkLabels').innerHTML = years.map(y=>`<span>${y}</span>`).join('');
  drawSparkline(vals, colorMap[key]||'#a08be8', meta.unit, meta.higher_is_better);
  document.getElementById('modalOverlay').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').style.display = 'none';
  document.body.style.overflow = '';
}
</script>
