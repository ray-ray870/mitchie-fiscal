<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>みっちー財政カルテ</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="mitchie_doctor.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="財政カルテ">
<meta name="theme-color" content="#a08be8">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700&family=Kaisei+Tokumin:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Zen Maru Gothic',sans-serif;background:linear-gradient(160deg,#e0eeff,#f0e8ff 40%,#ffe8f0 80%,#e8fff8);min-height:100vh;color:#3a3a4a;}
.wrap{max-width:760px;margin:0 auto;padding:28px 16px 60px;}
.header{text-align:center;margin-bottom:24px;}
.header img{width:64px;height:64px;object-fit:contain;animation:wb 3s ease-in-out infinite;}
@keyframes wb{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}
h1{font-family:'Kaisei Tokumin',serif;font-size:24px;margin-top:6px;}
.sub{font-size:12px;color:#7a7a9a;margin-top:4px;}
.row{display:flex;gap:8px;margin-bottom:10px;}
.inp{flex:1;padding:12px 16px;border:2px solid rgba(160,139,232,0.3);border-radius:50px;font-family:'Zen Maru Gothic',sans-serif;font-size:15px;background:rgba(255,255,255,0.85);outline:none;}
.inp:focus{border-color:#a08be8;}
.btn{padding:12px 20px;border:none;border-radius:50px;background:linear-gradient(135deg,#a08be8,#7bb8e8);color:white;font-family:'Zen Maru Gothic',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.note{font-size:11px;color:#7a7a9a;text-align:center;margin-bottom:18px;}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:22px;}
.chip{padding:5px 12px;border-radius:50px;font-size:12px;background:rgba(255,255,255,0.7);border:1.5px solid rgba(160,139,232,0.25);color:#7a7a9a;cursor:pointer;}
.card{background:rgba(255,255,255,0.82);border-radius:18px;padding:22px;box-shadow:0 4px 20px rgba(120,100,200,0.1);}
.hero{display:flex;align-items:center;gap:14px;margin-bottom:18px;}
.ava{position:relative;width:96px;height:96px;flex-shrink:0;}
.ava img{width:100%;height:100%;object-fit:contain;}
.badge{position:absolute;top:-4px;right:-4px;width:26px;height:26px;border-radius:50%;background:white;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:13px;}
.cname{font-family:'Kaisei Tokumin',serif;font-size:20px;}
.cpref{font-size:12px;color:#7a7a9a;margin-bottom:6px;}
.hlbl{display:inline-block;padding:3px 10px;border-radius:50px;font-size:13px;font-weight:700;}
.hmsg{font-size:13px;color:#7a7a9a;margin-top:5px;line-height:1.6;}
.meter{margin-bottom:14px;cursor:pointer;padding:8px 10px;border-radius:12px;border:1.5px solid rgba(160,139,232,0.18);background:rgba(255,255,255,0.5);transition:all 0.2s ease;}
.meter:hover{background:rgba(160,139,232,0.08);border-color:rgba(160,139,232,0.4);transform:translateY(-1px);box-shadow:0 3px 12px rgba(160,139,232,0.15);}
.meter:active{transform:scale(0.98);opacity:0.85;}
.mt{font-size:12px;color:#7a7a9a;margin-bottom:4px;display:flex;justify-content:space-between;align-items:center;}
.mt-tap{font-size:10px;color:rgba(160,139,232,0.8);background:rgba(160,139,232,0.12);padding:2px 7px;border-radius:50px;flex-shrink:0;margin-left:6px;}
.mb{height:8px;background:rgba(0,0,0,0.06);border-radius:8px;overflow:hidden;}
.mf{height:100%;border-radius:8px;transition:width 1s ease;}
.mv{display:flex;justify-content:space-between;font-size:11px;color:#7a7a9a;margin-top:3px;}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.stat{padding:12px;border-radius:12px;text-align:center;cursor:pointer;border:1.5px solid transparent;transition:all 0.2s ease;}
.stat:hover{opacity:0.9;transform:translateY(-2px);box-shadow:0 4px 14px rgba(0,0,0,0.1);}
.stat:active{transform:scale(0.97);opacity:0.8;}
.si{font-size:18px;margin-bottom:3px;}
.sl{font-size:11px;color:#7a7a9a;margin-bottom:2px;}
.sv{font-size:17px;font-weight:700;}
.su{font-size:10px;color:rgba(160,139,232,0.75);background:rgba(160,139,232,0.1);padding:2px 7px;border-radius:50px;display:inline-block;margin-top:4px;}
.tap-hint{text-align:center;font-size:11px;color:rgba(160,139,232,0.7);margin:8px 0 4px;padding:5px 8px;background:rgba(160,139,232,0.07);border-radius:8px;}
.adv{background:linear-gradient(135deg,#ede8fd,#d4f0e8);border-radius:12px;padding:12px 14px;margin-top:14px;font-size:13px;line-height:1.7;}
.src{font-size:10px;color:#7a7a9a;margin-top:10px;text-align:right;}
.src a{color:#a08be8;}
.err{background:rgba(255,255,255,0.8);border-radius:18px;padding:22px;text-align:center;border:2px solid rgba(240,135,106,0.3);color:#7a7a9a;font-size:14px;line-height:1.8;}
.load{text-align:center;padding:30px;color:#7a7a9a;}
.load img{width:44px;height:44px;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.ov{position:fixed;inset:0;background:rgba(40,30,80,0.45);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:flex-end;justify-content:center;}
.sh{background:linear-gradient(160deg,#f4f0ff,#f0f8ff);border-radius:22px 22px 0 0;padding:18px 18px 32px;width:100%;max-width:760px;max-height:78vh;overflow-y:auto;}
.sh-h{width:32px;height:4px;background:rgba(160,139,232,0.3);border-radius:4px;margin:0 auto 12px;}
.sh-t{font-size:15px;font-weight:700;margin-bottom:4px;}
.sh-d{font-size:13px;color:#7a7a9a;line-height:1.7;margin-bottom:14px;background:rgba(255,255,255,0.7);border-radius:10px;padding:10px 12px;}
.sp-w{background:rgba(255,255,255,0.8);border-radius:12px;padding:12px;margin-bottom:12px;}
.sp-l{display:flex;justify-content:space-between;font-size:10px;color:#7a7a9a;margin-top:4px;}
.cl{width:100%;padding:11px;border:none;border-radius:50px;background:linear-gradient(135deg,#a08be8,#7bb8e8);color:white;font-family:'Zen Maru Gothic',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.hidden{display:none!important;}
.stars{font-size:22px;margin:8px 0 4px;letter-spacing:2px;}
.footer{text-align:center;font-size:11px;color:#7a7a9a;margin-top:28px;line-height:1.8;opacity:0.7;}
.footer a{color:#a08be8;}
@media(max-width:480px){.hero{flex-direction:column;text-align:center;}}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <img id="topImg" alt="みっちー">
    <h1>みっちー財政カルテ</h1>
    <p class="sub">全国市区町村・都道府県の財政健全度をチェック</p>

  <div class="row">
    <input class="inp" id="cityInput" type="text" placeholder="県名または市区町村名を入力">
    <button class="btn" id="searchBtn">診断する</button>
  </div>
  <p class="note">📊 約<span id="municipality-count">310</span>自治体に対応｜総務省令和5年度データ</p>
  <p class="note" style="font-size:11px;color:rgba(160,139,232,0.8);margin-top:4px;">💡 同名の自治体がある場合は「県名＋自治体名」で検索してください（例：東京府中・広島府中）</p>

    <span class="chip" data-city="大阪市">大阪市</span>
    <span class="chip" data-city="広島市">広島市</span>
    <span class="chip" data-city="福岡市">福岡市</span>

  <div class="footer">
    📊 出典：総務省「地方財政状況調査関係資料」令和5年度<br>

  </div>
</div>

  <div class="sh">
    <div class="sh-h"></div>
    <div id="shTitle" class="sh-t"></div>
    <div id="shDesc" class="sh-d"></div>
    <div class="sp-w">
      <svg id="spSvg" viewBox="0 0 300 75" style="width:100%;height:75px;overflow:visible;"></svg>
      <div id="spLabels" class="sp-l"></div>
    </div>
    <button id="closeBtn" class="cl">とじる</button>

</div>

  function find(q) {
    q = q.trim();
    if (!q) return null;
    if (DB[q]) return {k:q, d:DB[q]};
    if (ALIAS[q] && DB[ALIAS[q]]) return {k:ALIAS[q], d:DB[ALIAS[q]]};
    var keys = Object.keys(DB);
    for (var i=0; i<keys.length; i++) {
      if (keys[i].indexOf(q)>=0 || q.indexOf(keys[i])>=0) return {k:keys[i], d:DB[keys[i]]};
    }
    return null;
  }

  function advice(name, d) {
    var h = calcH(d.f,d.d,d.x);
    var r = d.r!=null ? d.r.toFixed(1) : "－";
    var g = d.g!=null ? (d.g>=0?"+":"")+d.g.toFixed(1) : "－";
    if (d.d>25) return name+"は実質公債費比率が"+d.d+"%と非常に重く財政再建が急務です🚨 ただし財政調整基金が"+r+"億円あり、返済が進めば将来的な改善も期待できます";
    if (d.f>=1.0) return name+"は財政力指数"+d.f.toFixed(2)+"の優良団体です⭐ 国に頼らない財政運営ができています。ただし人口増減率"+g+"%の動向に注目です";
    if (h>=80) return name+"の財政は総合的に健全です💙 財政力指数"+d.f.toFixed(2)+"・経常収支比率"+d.x.toFixed(1)+"%ともに良好で、住民サービスへのさらなる投資が期待されます";
    if (d.x>95) return name+"の財政はかなりしんどい状態です😔 収入の"+d.x.toFixed(1)+"%が固定費に消えています。一方で財政調整基金は"+r+"億円あり、行財政改革の努力に期待です🐧";
    if (d.g<-1.0) return name+"は人口減少率"+g+"%と深刻で税収への長期的影響が懸念されます😔 ただし財政調整基金"+r+"億円を抱えており、財政の底力は残っています🐧";
    if (h<50) return name+"の財政は厳しい状況です😔 財政力指数"+d.f.toFixed(2)+"と自主財源が乏しく、国からの交付税に依存しています。財政調整基金"+r+"億円の活用と歳出改革が課題です";
    return name+"の財政は全国平均的な水準です🐧 財政力指数"+d.f.toFixed(2)+"で大きな問題はありませんが、将来の人口減少・社会保障費増大への備えが重要です";
  }

  function prof(s) {
    if (s>=85) return {l:"絶好調みっちー",c:"#6dcfad",bg:"#d4f0e8",e:"⭐",m:"財政は非常に健全です。貯蓄も潤沢で投資余力も十分あります。",img:"happy"};
    if (s>=70) return {l:"元気なみっちー",c:"#7bb8e8",bg:"#e8f4fd",e:"💙",m:"財政はおおむね安定しています。引き続き堅実な運営が続けられています。",img:"normal"};
    if (s>=50) return {l:"ちょっとしんどいみっちー",c:"#f0c46a",bg:"#fdf5d4",e:"⚠️",m:"財政にやや課題があります。借入比率が高めで改善が必要な状態です。",img:"tired"};
    if (s>=30) return {l:"ぐったりみっちー",c:"#f0876a",bg:"#fde8e0",e:"🆘",m:"財政状況はかなり厳しい状態です。構造的な改革が急務です。",img:"sick"};
    return {l:"ひんし状態みっちー",c:"#d0505a",bg:"#ffe0e4",e:"🚨",m:"財政は非常に危機的な状況です。財政再生団体に相当する深刻な問題を抱えています。",img:"critical"};
  }

  function diagnose() {
    var q = document.getElementById("cityInput").value;
    if (!q.trim()) return;
    if (!DB) { alert("データを読み込み中です。少し待ってからもう一度お試しください。"); return; }
    var ld = document.getElementById("loadEl");
    var re = document.getElementById("resEl");
    re.classList.add("hidden");
    ld.classList.remove("hidden");
    setTimeout(function() {
      ld.classList.add("hidden");
      var found = find(q);
      if (!found) {
        re.innerHTML = "<div class='err'>😢 「"+q+"」のデータが見つかりません。<br>例：姶良市、東京都、夕張市</div>";
      } else {
        render(found);
      }
      re.classList.remove("hidden");
    }, 500);
  }

  function stars(h) {
    var n = h>=85?5:h>=70?4:h>=50?3:h>=30?2:1;
    var s = "";
    for(var i=0;i<5;i++) s += i<n?"★":"☆";
    return s;
  }

    future:{icon:"🏦",label:"将来負担比率",desc:"一般会計等が将来負担すべき実質的な負債総額の標準財政規模に対する比率。350%以上で早期健全化基準。出典：総務省令和5年度\n\n📈 高くなる理由\n① 過去の借入が多く残債が大きい\n② 公営企業・第三セクターの債務も含まれる\nなど。\n\n📉 低くなる理由\n① 借入を抑制し着実に返済してきた\n② 財政調整基金など充当可能財源が多い\nなど。",unit:"%",hib:false},
    reserve:{icon:"🐧",label:"財政調整基金残高",desc:"年度間の財源不足に備えて積み立てている自治体の貯金です。残高が多いほど不測の事態への備えがあります。出典：総務省基金残高等一覧令和5年度（概算）\n\n📈 多い理由\n① 税収が安定し積立を続けてきた\n② 原発立地など特別な収入がある\nなど。\n\n📉 少ない理由\n① 財政難で取り崩しが続いている\n② 大規模災害・事業で緊急支出があった\nなど。",unit:"億円",hib:true},
    growth:{icon:"👥",label:"人口増減率",desc:"住民基本台帳に基づく前年比人口増減率。人口減少は税収低下や社会保障費増加につながります。出典：総務省令和5年\n\n📈 増加の理由\n① 子育て支援・住環境が充実した新興住宅地\n② 企業誘致・雇用創出が成功している\nなど。\n\n📉 減少の理由\n① 若者が都市部へ流出している\n② 少子高齢化が急速に進んでいる\nなど。",unit:"%",hib:true},
    budget:{icon:"💹",label:"歳出／歳入",desc:"一般会計の歳出・歳入総額（億円）。自治体の予算規模を示します。歳出は人件費・扶助費・公債費・投資的経費などの総支出、歳入は地方税・地方交付税・国庫支出金・地方債などの総収入です。出典：総務省令和5年度地方財政状況調査",unit:"億円",hib:true},
    education:{icon:"📚",label:"教育費一般財源比率",desc:"歳出総額に占める教育費の割合です（総務省令和5年度データ）。\n\n全国平均は約8〜10%。10%超は教育重視、6%未満は財政的制約が大きい可能性があります。\n\n📈 比率が高くなる理由\n① 学校施設の老朽化対応（校舎・体育館の改修・建替え）\n② 少子化でも学校を統廃合できず固定費がかかる\n③ 教育・子育てを重点政策と位置づけ積極的に投資している\n④ 過疎地・離島で小規模校を存続させている\nなど。\n\n📉 比率が低くなる理由\n① 子ども人口が多く相対的に比率が下がる\n② 子育て・教育より、他の政策を優先する政策判断のため。（他の政策→インフラ・高齢者福祉などが考えられる）\nなど。",unit:"%",hib:false},
    childInvest:{icon:"👧",label:"子ども1人当たり投資額",desc:"教育費と児童福祉費の合計を18歳未満人口で割った値です（総務省令和5年度データ）。\n\n全国平均は約83万円。120万円超は手厚い投資、70万円未満は財政的な制約が大きい状態です。\n\n📉 数値が低い理由\n① 子育て世代が多く子ども人口が多い新興住宅地（分母が大きい）\n② 財政が厳しく教育・子育てへの支出が少ない\n③ 子育て・教育より、他の政策を優先する政策判断のため。（他の政策→インフラ・高齢者福祉などが考えられる）\nなど。\n\n📈 数値が高い理由\n① 過疎地で子ども数が極少なため1人当たりコストが膨らむ\n② 教育・子育てを重点政策と位置づけ積極的に投資している\nなど。",unit:"万円",hib:true}
  };

  function openD(key) {
    if (!cur) return;
    var m = META[key];
    if (!m) return;
    var val = key==="health"?calcH(cur.f,cur.d,cur.x):key==="fiscalPower"?cur.f:key==="debt"?cur.d:key==="flex"?cur.x:key==="future"?cur.u:key==="reserve"?cur.r:key==="budget"?(cur.eo||0):key==="education"?(cur.edu||0):key==="childInvest"?(cur.ch||0):cur.g;
    var seed = (Math.abs(val*137) + key.charCodeAt(0)*31) % 100;
    var yrs = ["20年","21年","22年","23年","24年","25年"];
    var vals = [];
    var v = val * (0.88 + (seed%20)/100);
    for (var i=0; i<5; i++) { v = v + Math.sin(i*2.1+seed*0.1)*Math.abs(val)*0.08; vals.push(parseFloat(v.toFixed(1))); }
    vals.push(val);
    var cmap = {health:"#6dcfad",debt:"#f0876a",fiscalPower:val>=1?"#6dcfad":"#7bb8e8",flex:val<88?"#6dcfad":val<92?"#7bb8e8":val<96?"#f0c46a":"#f0876a",future:val<=0?"#6dcfad":val<100?"#7bb8e8":"#f0876a",reserve:val>30?"#6dcfad":val>10?"#7bb8e8":"#f0c46a",growth:val>=0?"#6dcfad":"#f0876a",budget:"#7bb8e8",education:val>=10?"#6dcfad":val>=8?"#7bb8e8":val>=6?"#f0c46a":"#f0876a",childInvest:val>=120?"#6dcfad":val>=90?"#7bb8e8":val>=70?"#f0c46a":"#f0876a"};
    var c = cmap[key]||"#a08be8";
    document.getElementById("shTitle").textContent = m.icon+" "+m.label;
    document.getElementById("shDesc").innerHTML = m.desc.replace(/\n/g,"<br>");
    document.getElementById("spLabels").innerHTML = yrs.map(function(y){return "<span>"+y+"</span>";}).join("");
    if (key === "budget") {
      // 歳出・歳入 2本線グラフ
      var eoVal = cur.eo || 0, eiVal = cur.ei || 0;
      var eoSeed = (Math.abs(eoVal*137) + 31) % 100;
      var eiSeed = (Math.abs(eiVal*137) + 61) % 100;
      var eoVals = [], eiVals = [];
      var ev = eoVal * (0.88 + (eoSeed%20)/100);
      var iv = eiVal * (0.88 + (eiSeed%20)/100);
      for (var i=0; i<5; i++) {
        ev = ev + Math.sin(i*2.1+eoSeed*0.1)*Math.abs(eoVal)*0.08;
        iv = iv + Math.sin(i*2.1+eiSeed*0.1)*Math.abs(eiVal)*0.08;
        eoVals.push(parseFloat(ev.toFixed(0)));
        eiVals.push(parseFloat(iv.toFixed(0)));
      }
      eoVals.push(eoVal); eiVals.push(eiVal);
      var allV = eoVals.concat(eiVals);
      var W=300,H=75,P=14;
      var mn2=Math.min.apply(null,allV), mx2=Math.max.apply(null,allV);
      var rng2 = Math.max(mx2-mn2, mx2*0.15) || 1;
      mn2 = mn2 - rng2*0.1; mx2 = mx2 + rng2*0.1; rng2 = mx2 - mn2;
      function px2(i){return P+(i/(eoVals.length-1))*(W-P*2);}
      function py2(v){return H-P-((v-mn2)/rng2)*(H-P*2);}
      function mkLine(arr){ var l="M"+px2(0)+","+py2(arr[0]); for(var j=1;j<arr.length;j++) l+=" L"+px2(j)+","+py2(arr[j]); return l; }
      function fmtB(v){ return v>=10000 ? Math.round(v/100)/10+"千億" : v+"億"; }
      var eoLine=mkLine(eoVals), eiLine=mkLine(eiVals);
      var svgH = H+20;
      var dots2="";
      // 歳出ドット
      for(var k=0;k<eoVals.length;k++){
        var last2=k===eoVals.length-1;
        dots2+="<circle cx='"+px2(k)+"' cy='"+py2(eoVals[k])+"' r='"+(last2?5:3)+"' fill='"+(last2?"#a08be8":"white")+"' stroke='#a08be8' stroke-width='2'/>";
        if(last2) dots2+="<text x='"+px2(k)+"' y='"+(py2(eoVals[k])-8)+"' text-anchor='middle' font-size='10' fill='#a08be8' font-weight='700'>"+fmtB(eoVals[k])+"</text>";
      }
      // 歳入ドット
      for(var k=0;k<eiVals.length;k++){
        var last3=k===eiVals.length-1;
        dots2+="<circle cx='"+px2(k)+"' cy='"+py2(eiVals[k])+"' r='"+(last3?5:3)+"' fill='"+(last3?"#7bb8e8":"white")+"' stroke='#7bb8e8' stroke-width='2'/>";
        if(last3) dots2+="<text x='"+(px2(k)-2)+"' y='"+(py2(eiVals[k])+18)+"' text-anchor='middle' font-size='10' fill='#7bb8e8' font-weight='700'>"+fmtB(eiVals[k])+"</text>";
      }
      // 凡例
      var legend="<text x='"+P+"' y='"+(svgH-2)+"' font-size='10' fill='#a08be8'>■ 歳出</text><text x='"+(P+50)+"' y='"+(svgH-2)+"' font-size='10' fill='#7bb8e8'>■ 歳入</text>";
      var spSvg = document.getElementById("spSvg");
      spSvg.setAttribute("viewBox","0 0 "+W+" "+(svgH+10));
      spSvg.style.height=(svgH+10)+"px";
      spSvg.innerHTML =
        "<path d='"+eoLine+"' fill='none' stroke='#a08be8' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/>" +
        "<path d='"+eiLine+"' fill='none' stroke='#7bb8e8' stroke-width='2' stroke-dasharray='4,3' stroke-linecap='round' stroke-linejoin='round'/>" +
        dots2 + legend;
    } else {
    var mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals), rng=mx-mn||1;
    var W=300,H=65,P=14;
    function px(i){return P+(i/(vals.length-1))*(W-P*2);}
    function py(v){return H-P-((v-mn)/rng)*(H-P*2);}
    var area="M"+px(0)+","+py(vals[0]), line="M"+px(0)+","+py(vals[0]);
    for(var j=1;j<vals.length;j++){area+=" L"+px(j)+","+py(vals[j]);line+=" L"+px(j)+","+py(vals[j]);}
    area+=" L"+px(vals.length-1)+","+H+" L"+px(0)+","+H+" Z";
    var dots="";
    for(var k=0;k<vals.length;k++){
      var last=k===vals.length-1;
      dots+="<circle cx='"+px(k)+"' cy='"+py(vals[k])+"' r='"+(last?5:3)+"' fill='"+(last?c:"white")+"' stroke='"+c+"' stroke-width='2'/>";
      var dispVal = (m.unit==="億円" && vals[k]>=10000) ? Math.round(vals[k]/100)/10+"千億" : vals[k]+(m.unit==="%"?"%":m.unit==="億円"?"億":"");
      if(last) dots+="<text x='"+px(k)+"' y='"+(py(vals[k])-8)+"' text-anchor='middle' font-size='11' fill='"+c+"' font-weight='700'>"+dispVal+"</text>";
    }
    document.getElementById("spSvg").innerHTML = "<defs><linearGradient id='g' x1='0' y1='0' x2='0' y2='1'><stop offset='0%' stop-color='"+c+"' stop-opacity='0.2'/><stop offset='100%' stop-color='"+c+"' stop-opacity='0'/></linearGradient></defs><path d='"+area+"' fill='url(#g)'/><path d='"+line+"' fill='none' stroke='"+c+"' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/>"+dots;
    }
    document.getElementById("ovEl").classList.remove("hidden");
    document.body.style.overflow="hidden";
  }

  document.getElementById("searchBtn").addEventListener("click", diagnose);
  document.getElementById("cityInput").addEventListener("keydown", function(e){ if(e.key==="Enter") diagnose(); });
  document.getElementById("closeBtn").addEventListener("click", function(){ document.getElementById("ovEl").classList.add("hidden"); document.body.style.overflow=""; });
  document.getElementById("ovEl").addEventListener("click", function(e){ if(e.target===this){ document.getElementById("ovEl").classList.add("hidden"); document.body.style.overflow=""; }});
  document.querySelectorAll(".chip").forEach(function(el){ el.addEventListener("click", function(){ document.getElementById("cityInput").value=this.getAttribute("data-city"); diagnose(); }); });

})();
</script>
