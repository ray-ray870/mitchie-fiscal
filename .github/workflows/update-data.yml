name: 年次データ更新

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'scripts/config.json のURLを新年度のものに更新済みですか？'
        required: true
        default: 'はい'
        type: choice
        options:
          - 'はい'
          - 'いいえ（まだ）'

jobs:
  update-data:
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'はい'
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Pythonをセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 必要なパッケージをインストール
        run: pip install openpyxl

      - name: データ更新スクリプトを実行
        id: update
        run: python scripts/update_fiscal_data.py

      - name: 変更内容を確認
        id: diff
        run: |
          if git diff --quiet -- data-*.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 変更をコミット・プッシュ
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data-*.json
          git commit -m "年次データ自動更新 ($(date +'%Y-%m-%d'))"
          git push

      - name: 変更なしの場合の通知
        if: steps.diff.outputs.changed == 'false'
        run: echo "データに変更はありませんでした（URLが正しいか確認してください）"
