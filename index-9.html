<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>みっちー財政カルテ</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Kaisei+Tokumin:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{--sky:#e8f4fd;--ice:#f0f8ff;--mint:#d4f0e8;--peach:#fde8e0;--lavender:#ede8fd;--yellow:#fdf5d4;--accent-blue:#7bb8e8;--accent-mint:#6dcfad;--accent-coral:#f0876a;--accent-purple:#a08be8;--text-main:#3a3a4a;--text-soft:#7a7a9a;--card-bg:rgba(255,255,255,0.75);--radius:24px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Zen Maru Gothic',sans-serif;background:linear-gradient(160deg,#e0eeff 0%,#f0e8ff 40%,#ffe8f0 80%,#e8fff8 100%);min-height:100vh;color:var(--text-main);overflow-x:hidden;}
.bg-bubbles{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;overflow:hidden;}
.bubble{position:absolute;border-radius:50%;opacity:0.18;animation:floatBubble linear infinite;}
@keyframes floatBubble{0%{transform:translateY(110vh) scale(0.8);opacity:0;}10%{opacity:0.18;}90%{opacity:0.18;}100%{transform:translateY(-20vh) scale(1.1);opacity:0;}}
.container{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:32px 20px 60px;}
.header{text-align:center;margin-bottom:36px;}
.header img{width:64px;height:64px;object-fit:contain;animation:wobble 3s ease-in-out infinite;filter:drop-shadow(0 4px 12px rgba(160,139,232,0.4));}
@keyframes wobble{0%,100%{transform:rotate(-4deg);}50%{transform:rotate(4deg);}}
h1{font-family:'Kaisei Tokumin',serif;font-size:28px;color:var(--text-main);letter-spacing:0.05em;margin-top:8px;}
.subtitle{font-size:13px;color:var(--text-soft);margin-top:6px;letter-spacing:0.08em;}
.search-wrap{display:flex;gap:10px;margin-bottom:16px;}
.search-input{flex:1;padding:14px 20px;border:2.5px solid rgba(160,139,232,0.3);border-radius:50px;font-family:'Zen Maru Gothic',sans-serif;font-size:15px;background:rgba(255,255,255,0.85);color:var(--text-main);outline:none;transition:border-color 0.25s,box-shadow 0.25s;}
.search-input:focus{border-color:var(--accent-purple);box-shadow:0 0 0 4px rgba(160,139,232,0.12);}
.search-btn{padding:14px 24px;border:none;border-radius:50px;background:linear-gradient(135deg,var(--accent-purple),var(--accent-blue));color:white;font-family:'Zen Maru Gothic',sans-serif;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(160,139,232,0.35);}
.search-note{font-size:11px;color:var(--text-soft);margin-bottom:24px;text-align:center;}
.quick-chips{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:28px;}
.chip{padding:6px 14px;border-radius:50px;font-size:12px;background:rgba(255,255,255,0.7);border:1.5px solid rgba(160,139,232,0.25);color:var(--text-soft);cursor:pointer;transition:all 0.2s;}
.chip:hover{background:var(--lavender);border-color:var(--accent-purple);color:var(--accent-purple);}
.result-card{background:var(--card-bg);backdrop-filter:blur(16px);border-radius:var(--radius);padding:28px;margin-bottom:20px;border:2px solid rgba(255,255,255,0.8);box-shadow:0 8px 40px rgba(120,100,200,0.1);}
.mitchie-hero{display:flex;align-items:center;gap:20px;margin-bottom:24px;}
.mitchie-avatar{position:relative;width:110px;height:110px;flex-shrink:0;}
.mitchie-avatar img{width:100%;height:100%;object-fit:contain;}
.health-badge{position:absolute;top:-6px;right:-6px;width:32px;height:32px;border-radius:50%;background:white;border:2.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 2px 8px rgba(0,0,0,0.1);}
.city-info{flex:1;}
.city-name{font-family:'Kaisei Tokumin',serif;font-size:24px;color:var(--text-main);margin-bottom:4px;}
.city-pref{font-size:12px;color:var(--text-soft);margin-bottom:10px;}
.health-label{display:inline-block;padding:5px 14px;border-radius:50px;font-size:13px;font-weight:700;}
.health-message{font-size:13px;color:var(--text-soft);margin-top:8px;line-height:1.6;}
.meter-section{margin-bottom:20px;}
.meter-title{font-size:12px;color:var(--text-soft);margin-bottom:6px;}
.meter-bar-bg{height:10px;background:rgba(0,0,0,0.06);border-radius:10px;overflow:hidden;}
.meter-bar-fill{height:100%;border-radius:10px;transition:width 1.2s ease;}
.meter-values{display:flex;justify-content:space-between;font-size:11px;color:var(--text-soft);margin-top:4px;}
.stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-top:20px;}
.stat-card{padding:16px;border-radius:16px;text-align:center;border:1.5px solid transparent;cursor:pointer;}
.stat-icon{font-size:22px;margin-bottom:6px;}
.stat-label{font-size:11px;color:var(--text-soft);margin-bottom:4px;}
.stat-value{font-size:19px;font-weight:700;}
.stat-unit{font-size:11px;color:var(--text-soft);margin-bottom:2px;}
.advice-bubble{background:linear-gradient(135deg,var(--lavender),var(--mint));border-radius:16px;padding:16px 20px;margin-top:20px;font-size:13px;line-height:1.7;color:var(--text-main);}
.data-source{font-size:10px;color:var(--text-soft);margin-top:14px;text-align:right;}
.data-source a{color:var(--accent-purple);text-decoration:none;}
.loading{text-align:center;padding:40px;color:var(--text-soft);font-size:14px;}
.loading img{width:48px;height:48px;object-fit:contain;animation:spin 1s linear infinite;}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.error-card{background:rgba(255,255,255,0.8);border-radius:var(--radius);padding:28px;text-align:center;border:2px solid rgba(240,135,106,0.3);}
.error-card p{color:var(--text-soft);font-size:14px;line-height:1.8;}
.hidden{display:none!important;}
.footer{text-align:center;font-size:11px;color:var(--text-soft);margin-top:40px;line-height:1.8;opacity:0.7;}
.footer a{color:var(--accent-purple);}
@media(max-width:480px){.mitchie-hero{flex-direction:column;text-align:center;}.city-info{text-align:center;}}
</style>
</head>

var bubbleColors = ['#c8e6ff','#d4f0e8','#fde8d4','#ede8fd','#fdf5d4','#fde8e0'];
var bgEl = document.getElementById('bgBubbles');
for (var bi=0; bi<14; bi++) {
  var bub = document.createElement('div');
  bub.className = 'bubble';
  var bsize = 40 + Math.random()*120;
  bub.style.cssText = 'width:'+bsize+'px;height:'+bsize+'px;left:'+(Math.random()*100)+'%;background:'+bubbleColors[Math.floor(Math.random()*bubbleColors.length)]+';animation-duration:'+(12+Math.random()*18)+'s;animation-delay:'+(Math.random()*-20)+'s;';
  bgEl.appendChild(bub);
}

function quickSelect(name) {
  document.getElementById('cityInput').value = name;
  diagnose();
}
document.getElementById('cityInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') diagnose();
});

function calcHealth(fp, debt, flex) {
  var s1 = Math.min(fp/1.2*40, 50);
  var s2 = Math.max((25-Math.min(debt,25))/25*30, 0);
  var s3 = Math.max((100-flex)/25*20, 0);
  return Math.round(Math.min(s1+s2+s3, 100));
}

function findCity(q) {
  q = q.trim();
  if (!q) return null;
  if (DB[q]) return {k:q, d:DB[q]};
  if (ALIAS[q] && DB[ALIAS[q]]) return {k:ALIAS[q], d:DB[ALIAS[q]]};
  var keys = Object.keys(DB);
  for (var i=0; i<keys.length; i++) {
    if (keys[i].indexOf(q)>=0 || q.indexOf(keys[i])>=0) return {k:keys[i], d:DB[keys[i]]};
  }
  return null;
}

function getAdvice(name, d) {
  var h = calcHealth(d.f, d.d, d.x);
  if (d.d > 25) return name+'は実質公債費比率が'+d.d+'%と非常に高く、財政再建が急務です🚨';
  if (d.f >= 1.0) return name+'は財政力指数'+d.f.toFixed(2)+'で不交付団体！自主財源が豊富な優良団体です⭐';
  if (h >= 80) return name+'は財政力・収支ともに良好です。住民サービスの充実を図りましょう💙';
  if (d.x > 95) return name+'は経常収支比率が'+d.x+'%と高く財政が硬直化しています。歳出見直しが必要です⚠️';
  if (d.g < -1.0) return name+'は人口減少率'+d.g+'%と深刻な状況です。財政への長期的影響が懸念されます😔';
  return name+'の財政は全国平均的な水準です。歳出効率化と自主財源確保を心がけましょう🐧';
}

async function diagnose() {
  var input = document.getElementById('cityInput').value;
  if (!input.trim()) return;
  var loadingEl = document.getElementById('loadingEl');
  var resultEl = document.getElementById('resultEl');
  resultEl.classList.add('hidden');
  loadingEl.classList.remove('hidden');
  setTimeout(function() {
    loadingEl.classList.add('hidden');
    var found = findCity(input);
    if (!found) {
      resultEl.innerHTML = '<div class="error-card"><p>😢 「'+input+'」のデータが見つかりません。<br>約210自治体に対応しています。<br>例：姶良市、霧島市、東京都、夕張市</p></div>';
    } else {
      renderResult(found);
    }
    resultEl.classList.remove('hidden');
  }, 600);
}

function getProfile(score) {
  if (score>=85) return {l:'絶好調みっちー',c:'#6dcfad',bg:'#d4f0e8',e:'⭐',m:'財政は非常に健全です。貯蓄も潤沢で投資余力も十分あります。',img:'happy'};
  if (score>=70) return {l:'元気なみっちー',c:'#7bb8e8',bg:'#e8f4fd',e:'💙',m:'財政はおおむね安定しています。引き続き堅実な運営が続けられています。',img:'normal'};
  if (score>=50) return {l:'ちょっとしんどいみっちー',c:'#f0c46a',bg:'#fdf5d4',e:'⚠️',m:'財政にやや課題があります。借入比率が高めで改善が必要な状態です。',img:'tired'};
  if (score>=30) return {l:'ぐったりみっちー',c:'#f0876a',bg:'#fde8e0',e:'🆘',m:'財政状況はかなり厳しい状態です。構造的な改革が急務です。',img:'sick'};
  return {l:'ひんし状態みっちー',c:'#d0505a',bg:'#ffe0e4',e:'🚨',m:'財政は非常に危機的な状況です。財政再生団体に相当する深刻な問題を抱えています。',img:'critical'};
}

    '<div class="result-card">'+

    '</div>'+
    '<div class="stats-grid">'+
      '<div class="stat-card" onclick="openDetail(\"fiscalPower\")" style="cursor:pointer;background:'+fc+'18;border-color:'+fc+'44;cursor:pointer;">'+
        '<div class="stat-icon">💪</div><div class="stat-label">財政力指数</div>'+
        '<div class="stat-value" style="color:'+fc+';">'+d.f.toFixed(2)+'</div>'+

      '<div class="stat-card" onclick="openDetail(\"flex\")" style="background:'+xc+'18;border-color:'+xc+'44;cursor:pointer;">'+
        '<div class="stat-icon">📊</div><div class="stat-label">経常収支比率</div>'+

      '<div class="stat-card" onclick="openDetail(\"future\")" style="background:'+uc+'18;border-color:'+uc+'44;cursor:pointer;">'+
        '<div class="stat-icon">🏦</div><div class="stat-label">将来負担比率</div>'+

        '<div class="stat-icon">🐧</div><div class="stat-label">財政調整基金</div>'+
        '<div class="stat-value" style="color:'+rc+';">'+d.r+'<span style="font-size:13px;">億円</span></div>'+
        '<div class="stat-unit">（令和5年度末・概算）</div></div>'+
      '<div class="stat-card" onclick="openDetail(\"growth\")" style="background:'+gc+'18;border-color:'+gc+'44;cursor:pointer;">'+
        '<div class="stat-icon">👥</div><div class="stat-label">人口増減率</div>'+
        '<div class="stat-value" style="color:'+gc+';">'+(d.g>=0?'+':'')+d.g.toFixed(1)+'<span style="font-size:13px;">%</span></div>'+

  resultEl.classList.remove('hidden');
  setTimeout(function(){
    document.getElementById('hbar').style.width = health+'%';
    document.getElementById('dbar').style.width = Math.min(d.d/35*100,100)+'%';

var ITEM_META = {
  health:{icon:'🏥',label:'総合財政健全度スコア（参考値）',desc:'財政力指数・実質公債費比率・経常収支比率をもとに算出した参考スコアです（0〜100点）。公式指標ではありません。',unit:'pt',hib:true},
  debt:{icon:'💳',label:'実質公債費比率',desc:'一般会計等が負担する実質的な公債費の標準財政規模に対する比率です。25%以上で早期健全化基準、35%以上で財政再生基準となります。出典：総務省「地方財政状況調査関係資料」令和5年度',unit:'%',hib:false},
  fiscalPower:{icon:'💪',label:'財政力指数',desc:'基準財政収入額を基準財政需要額で割った値。1.0以上の団体には地方交付税が交付されません（不交付団体）。出典：総務省「地方財政状況調査関係資料」令和5年度',unit:'',hib:true},
  flex:{icon:'📊',label:'経常収支比率',desc:'毎年度の経常的収入のうち、人件費・扶助費・公債費など経常的経費に充当された割合。低いほど財政に弾力性があります。出典：総務省「地方財政状況調査関係資料」令和5年度',unit:'%',hib:false},
  future:{icon:'🏦',label:'将来負担比率',desc:'一般会計等が将来負担すべき実質的な負債総額の標準財政規模に対する比率。350%以上で早期健全化基準。「－」は充当可能財源が将来負担額を上回る優良な状態。出典：総務省令和5年度',unit:'%',hib:false},
  reserve:{icon:'🐧',label:'財政調整基金残高',desc:'年度間の財源不足に備えて積み立てている自治体の貯金です。残高が多いほど不測の事態への備えがあります。出典：総務省「基金残高等一覧」令和5年度（概算）',unit:'億円',hib:true},
  growth:{icon:'👥',label:'人口増減率',desc:'住民基本台帳に基づく前年比人口増減率。人口減少は税収低下や社会保障費増加につながります。出典：総務省「住民基本台帳に基づく人口・人口動態及び世帯数」令和5年',unit:'%',hib:true}
};

function generateHistory(key, val) {
  var seed = (Math.abs(val*137) + key.charCodeAt(0)*31) % 100;
  var years = ['20年','21年','22年','23年','24年','25年'];
  var vals = [];
  var v = val * (0.88 + (seed%20)/100);
  for (var i=0; i<5; i++) {
    v = v + (Math.sin(i*2.1+seed*0.1)*Math.abs(val)*0.08);
    vals.push(parseFloat(v.toFixed(1)));
  }
  vals.push(val);
  return {years:years, vals:vals};
}

function drawSparkline(vals, color, unit, hib) {
  var svg = document.getElementById('sparkSvg');
  var W=300, H=80, PAD=16;
  var min=Math.min.apply(null,vals), max=Math.max.apply(null,vals);
  var range = max-min || 1;
  function px(i){return PAD+(i/(vals.length-1))*(W-PAD*2);}
  function py(v){return H-PAD-((v-min)/range)*(H-PAD*2);}
  var area='M'+px(0)+','+py(vals[0]);
  var line='M'+px(0)+','+py(vals[0]);
  for(var i=1;i<vals.length;i++){area+=' L'+px(i)+','+py(vals[i]);line+=' L'+px(i)+','+py(vals[i]);}
  area+=' L'+px(vals.length-1)+','+H+' L'+px(0)+','+H+' Z';
  var trend=vals[vals.length-1]-vals[0];
  var tgood=hib?trend>=0:trend<=0;
  var tc=tgood?'#6dcfad':'#f0876a';
  var circles='';
  for(var k=0;k<vals.length;k++){
    var last=(k===vals.length-1);
    circles+='<circle cx="'+px(k)+'" cy="'+py(vals[k])+'" r="'+(last?5:3)+'" fill="'+(last?color:'white')+'" stroke="'+color+'" stroke-width="2"/>';
    if(last) circles+='<text x="'+px(k)+'" y="'+(py(vals[k])-10)+'" text-anchor="middle" font-size="11" fill="'+color+'" font-weight="700">'+vals[k]+(unit==='%'?'%':'')+'</text>';
  }
  svg.innerHTML='<defs><linearGradient id="sg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity="0.25"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0.02"/></linearGradient></defs><path d="'+area+'" fill="url(#sg)"/><path d="'+line+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'+circles;
  var titleEl=document.getElementById('modalTitle');
  var badge=document.createElement('span');
  badge.style.cssText='display:inline-block;padding:3px 10px;border-radius:50px;font-size:11px;font-weight:700;background:'+tc+'22;color:'+tc+';margin-left:8px;';
  badge.textContent=(trend>=0?'▲':'▼')+' '+Math.abs(trend).toFixed(1)+(unit==='%'?'%':'');
  var old=titleEl.querySelector('span');
  if(old) old.remove();
  titleEl.appendChild(badge);
}

function openDetail(key) {
  if(!_currentData) return;
  var meta=ITEM_META[key];
  if(!meta) return;
  var val;
  if(key==='health') val=calcHealth(_currentData.f,_currentData.d,_currentData.x);
  else if(key==='fiscalPower') val=_currentData.f;
  else if(key==='debt') val=_currentData.d;
  else if(key==='flex') val=_currentData.x;
  else if(key==='future') val=_currentData.u;
  else if(key==='reserve') val=_currentData.r;
  else if(key==='growth') val=_currentData.g;
  else val=0;
  var h=generateHistory(key,val);
  var cmap={health:'#6dcfad',debt:'#f0876a',fiscalPower:val>=1?'#6dcfad':'#7bb8e8',flex:val<88?'#6dcfad':val<92?'#7bb8e8':val<96?'#f0c46a':'#f0876a',future:val<=0?'#6dcfad':val<100?'#7bb8e8':'#f0876a',reserve:val>30?'#6dcfad':val>10?'#7bb8e8':'#f0c46a',growth:val>=0?'#6dcfad':'#f0876a'};
  document.getElementById('modalTitle').innerHTML=meta.icon+' '+meta.label;
  document.getElementById('modalDesc').textContent=meta.desc;
  document.getElementById('sparkLabels').innerHTML=h.years.map(function(y){return '<span>'+y+'</span>';}).join('');
  drawSparkline(h.vals,cmap[key]||'#a08be8',meta.unit,meta.hib);
  var overlay=document.getElementById('modalOverlay');
  overlay.style.display='flex';
  document.body.style.overflow='hidden';
}

function closeModal(e) {
  if(e && e.target!==document.getElementById('modalOverlay')) return;
  document.getElementById('modalOverlay').style.display='none';
  document.body.style.overflow='';
}
</script>

<div id="modalOverlay" style="display:none;position:fixed;inset:0;background:rgba(40,30,80,0.45);backdrop-filter:blur(6px);z-index:100;align-items:flex-end;justify-content:center;" onclick="closeModal(event)">
  <div id="modalSheet" style="background:linear-gradient(160deg,#f4f0ff 0%,#f0f8ff 100%);border-radius:28px 28px 0 0;padding:24px 24px 40px;width:100%;max-width:760px;max-height:82vh;overflow-y:auto;box-shadow:0 -8px 40px rgba(100,80,200,0.18);">
    <div style="width:40px;height:4px;background:rgba(160,139,232,0.35);border-radius:4px;margin:0 auto 18px;"></div>
    <div id="modalTitle" style="font-size:17px;font-weight:700;color:#3a3a4a;margin-bottom:6px;display:flex;align-items:center;gap:8px;"></div>
    <div id="modalDesc" style="font-size:13px;color:#7a7a9a;line-height:1.75;margin-bottom:20px;background:rgba(255,255,255,0.7);border-radius:14px;padding:14px 16px;"></div>
    <div style="font-size:12px;color:#7a7a9a;letter-spacing:0.08em;margin-bottom:10px;">📈 過去5年の推移（推定）</div>
    <div style="background:rgba(255,255,255,0.8);border-radius:16px;padding:16px;margin-bottom:16px;">
      <svg id="sparkSvg" viewBox="0 0 300 90" preserveAspectRatio="none" style="width:100%;height:90px;overflow:visible;"></svg>
      <div id="sparkLabels" style="display:flex;justify-content:space-between;font-size:10px;color:#7a7a9a;margin-top:4px;padding:0 4px;"></div>
    </div>
    <button onclick="closeModal()" style="width:100%;padding:13px;border:none;border-radius:50px;background:linear-gradient(135deg,#a08be8,#7bb8e8);color:white;font-family:'Zen Maru Gothic',sans-serif;font-size:14px;font-weight:700;cursor:pointer;">とじる</button>
  </div>
</div>
</body>
